<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BrickTracker - LEGO Offerte e Set</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f5f5;
      color: #222;
    }

    header {
      background: #d0021b;
      color: white;
      padding: 20px;
      text-align: center;
    }

    header h1 {
      margin: 0;
      font-size: 32px;
      font-weight: 900;
      display: inline-block;
      padding: 5px 15px;
      background: #ffcf00;
      color: #000;
      border: 4px solid #000;
      border-radius: 8px;
      letter-spacing: 1px;
      box-shadow: 4px 4px 0px #000;
    }

    main {
      max-width: 900px;
      margin: 20px auto;
      padding: 20px;
      background: white;
      border-radius: 10px;
    }

    h2 {
      border-left: 5px solid #d0021b;
      padding-left: 10px;
    }

    /* 🔥 BOX OFFERTE */
    .offers {
      background: #fff3cd;
      border: 2px solid #ffc107;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 20px;
    }

    .offer-item {
      background: #fff;
      padding: 10px;
      margin: 10px 0;
      border-radius: 6px;
      border: 1px solid #ddd;
    }

    .price {
      color: #d0021b;
      font-weight: bold;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      background: #f0f0f0;
      margin: 10px 0;
      padding: 12px;
      border-radius: 6px;
    }

    .badge {
      display: inline-block;
      background: #d0021b;
      color: white;
      padding: 3px 8px;
      font-size: 12px;
      border-radius: 4px;
      margin-left: 8px;
    }

    /* 🔘 BUTTON */
    .btn {
      display: inline-block;
      margin-top: 15px;
      padding: 12px 18px;
      background: #d0021b;
      color: white;
      text-decoration: none;
      border-radius: 6px;
      font-weight: bold;
      transition: background 0.2s ease;
    }

    .btn:hover {
      background: #a80116;
    }

    footer {
      text-align: center;
      padding: 15px;
      font-size: 12px;
      color: #666;
    }
  </style>
</head>

<body>

  <header>
    <h1>BrickTracker</h1>
    <p>LEGO - Offerte e prezzi aggiornati</p>
  </header>

  <main>

    <!-- SET IN EVIDENZA -->
    <h2>Set in evidenza</h2>

    <!-- 🔥 SET OLTRE 50€ (popolato dal JS) -->
    <div id="high-price-container"></div>

    <!-- TUTTI I TEMI -->
    <h2>Tutti i temi</h2>

    <a href="./harry-potter/" class="btn">Harry Potter™</a>

  </main>

  <footer>
    © 2026 BrickTracker
  </footer>

  <!-- JS -->
  <script src="app.js"></script>

</body>
</html>
